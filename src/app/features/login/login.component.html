<div class="login-container">
    <h2>Login</h2>

    <div class = "form-group">
        <label for="username">Nick Usuario:</label>
        <input type="text" id="nickUsuario" name = "nickUsuario" [(ngModel)]= "nickUsuario">
    </div>
    <div class = "form-group">
        <label for="password">Contraseña:</label>
        <input type="password" id="contrasena" name = "contrasena" [(ngModel)]= "contrasena">
    </div>
    <button class="login-button" (click)="login()">Iniciar Sesión</button>
    <!-- @TODO: Implement login form here -->
</div>
