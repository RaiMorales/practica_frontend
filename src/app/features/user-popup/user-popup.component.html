<!--<div class="dialog-overlay" (click)="onCancel()"></div>-->
<div class="dialog-overlay"></div>
<div class="dialog-box">
    <div class="dialog-title">
        <h2>Pop Up</h2>
    </div>

    <div *ngIf="estadoPopup === 'CREAR'">

        <p>Contenido del pup up para crear un nuevo usuario</p>
    </div>

    <div *ngIf="estadoPopup === 'ACTUALIZAR'">

        <p>Contenido del pup up para actualizar un nuevo usuario existente</p>
    </div>
    <button (click)="onSave()">Aceptar</button>
    <button (click)="onCancel()">Cancelar</button>
    <!-- @TODO: Implementar el contenido del pop up, así como los botones de acción (ej. Cancelar, Aceptar) -->
</div>
